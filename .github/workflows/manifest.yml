# The manifest has to stay TRUE, and nothing about a static site makes it so.
#
# /tools.json and /llms.txt are what an agent reads to find out what it can call.
# The moment a tool gains or renames an MCP tool, they become a confident lie — and
# nobody notices, because a stale JSON file serves a 200 exactly like a fresh one.
#
# We already know this happens: the hand-written root README claimed agent-hq had 21
# MCP tools, lens 6, cortex 14. The real numbers were 28, 7 and 16. It drifted for
# months in a file people actually read.
#
# So: re-derive the manifest from the seven live repos on every push and every day,
# by SPAWNING EACH MCP SERVER and asking it `tools/list`. On a push, drift is a
# failure. On the daily run, drift is fixed and committed — the tools change on their
# own schedule, and the site should follow without anyone remembering to make it.
#
# Needs no services: `tools/list` is static, so no Docker, no Chrome, no running HQ.
name: manifest

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # the scheduled run commits the refreshed manifest

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24        # built-in node:sqlite

      - name: check out the seven tools
        run: |
          mkdir -p _tools
          for t in agent-hq lens anvil cortex scout recall iris; do
            git clone --depth 1 -q "https://github.com/tools-for-agents/$t.git" "_tools/$t"
          done

      # This step is also, for free, THE INSTALL TEST.
      #
      # It clones the seven repos exactly as an agent following /tools.json would, runs
      # `node <tool>/mcp/mcp-server.js` with nothing installed, and refuses to write the
      # manifest if any of them fails to answer `tools/list`. So the install command we
      # publish cannot rot without this going red — which matters more than usual, given
      # that cortex's `./vault` turned out not to be committed and nobody noticed for
      # months. A fresh clone is the only clone whose opinion counts.
      - name: re-derive the manifest — and prove a fresh clone still works
        run: node build/generate.mjs "$PWD/_tools"

      # LISTING A TOOL IS NOT THE SAME AS HAVING ONE.
      #
      # `tools/list` is a literal in the source. A server can advertise twenty-eight
      # tools and fail every single call, and the handshake above will not notice, and
      # the first thing to find out is a model in the middle of a task.
      #
      # /tools.json tells agents "here are 67 tools you can call". So call one.
      - name: and prove the tools are CALLABLE, not just listed
        run: |
          # agent-hq's tools are a skin over its HTTP API, so it needs the service up.
          (cd _tools/agent-hq && PORT=7700 HQ_DB_PATH=/tmp/smoke.db node src/server.js &)
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          node build/smoke.mjs "$PWD/_tools"

      # And then call ALL of them. tools/list and the dispatcher are two lists in the
      # same file with nothing keeping them in step, so an advertised tool whose handler
      # is missing crashes from the inside rather than 404ing — and /tools.json goes on
      # promising it to every agent that reads it.
      #
      # Safe only because _tools is throwaway: calling 67 tools with no arguments writes
      # a daily note and indexes whatever it can find. Fine in a runner, rude anywhere else.
      - name: call all 67, and demand none of them crash
        run: node build/routable.mjs "$PWD/_tools"

      - name: is what we publish still true?
        id: drift
        run: |
          rm -rf _tools
          if git diff --quiet -- llms.txt llms-full.txt tools.json; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "✓ the manifest matches the seven servers" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            {
              echo "### The published manifest no longer matches the tools"
              echo '```diff'
              git --no-pager diff --stat -- llms.txt llms-full.txt tools.json
              git --no-pager diff -- tools.json | head -80
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # On a push or PR: drift means someone changed a tool and did not regenerate.
      # Say so, and show them the diff — do not quietly serve the old answer.
      - name: fail on drift (push / PR)
        if: steps.drift.outputs.drifted == 'true' && github.event_name != 'schedule'
        run: |
          echo "::error::/tools.json and /llms.txt are stale. Run: node build/generate.mjs <workspace>"
          git --no-pager diff -- llms.txt llms-full.txt tools.json
          exit 1

      # On the daily run: the tools moved on their own. Follow them.
      - name: heal on drift (scheduled)
        if: steps.drift.outputs.drifted == 'true' && github.event_name == 'schedule'
        run: |
          git config user.name  "manifest bot"
          git config user.email "actions@github.com"
          git add llms.txt llms-full.txt tools.json
          git commit -m "chore: the tools moved — re-derived the manifest from tools/list"
          git push

  # IS `readOnlyHint: true` TRUE?
  #
  # 37 of the 67 tools declare themselves read-only. `routable.mjs` (above) checks the
  # annotations EXIST — because under the spec's pessimistic defaults, silence means
  # DESTRUCTIVE, and a tool that declares nothing declares the worst.
  #
  # NOBODY HAD EVER CHECKED THEY WERE TRUE.
  #
  # readOnlyHint is not decoration. It is a PROMISE TO THE CLIENT, and a conformant client
  # ACTS on it — it may call the tool without stopping to ask the user, because we said it
  # touches nothing. A "read-only" tool that writes has not merely got a wrong label; it has
  # walked through the one gate standing between it and the user's data.
  #
  #     A PROMISE NOBODY CHECKS IS A PROMISE YOU HAVE ONLY MADE TO YOURSELF.
  #
  # So: seed each store, ASSERT it is not empty (a read-only tool with nothing to read writes
  # nothing, for the most useless reason there is), call every read-only tool with arguments
  # good enough to make it actually work, close the server so SQLite checkpoints, and demand
  # not one byte moved.
  #
  # Proven to bite: plant an INSERT inside cortex_search and this goes red, naming the file.
  honest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: browser-actions/setup-chrome@v1   # iris needs a real browser to make a run to read
      - name: check out the seven tools
        run: |
          mkdir -p _tools
          for t in agent-hq lens anvil cortex scout recall iris; do
            git clone --depth 1 -q "https://github.com/tools-for-agents/$t.git" "_tools/$t"
          done
      - name: every readOnlyHint:true must be TRUE
        run: node build/honest.mjs --root "$PWD/_tools"

  # IS `openWorldHint: false` TRUE?
  #
  # The companion to `honest`. That one asks whether a tool that says it does not WRITE really
  # does not write. This one asks whether a tool that says it does not REACH THE OUTSIDE WORLD
  # really does not reach it.
  #
  # 10 of the 67 declare openWorldHint:true — they talk to the internet, and the client is told
  # so. The other 57 declare that they do NOT. That is a promise about where your data can go,
  # and a "closed" tool that quietly fetches a URL is an exfiltration path with a reassuring
  # label on it.
  #
  #     A TOOL THAT SAYS IT STAYS HOME MUST STAY HOME.
  #
  # THE WALL MUST BE PROVEN TO BLOCK, or this is a check that cannot fail — it would bless every
  # tool in the kit, including the ones that spend all day on the internet. So it first calls
  # scout_fetch (openWorldHint:true, needs the internet by definition) and DEMANDS it is stopped
  # at the border. Only then does it let the closed-world tools loose against the same wall.
  #
  # Loopback is allowed: agent-hq's 28 tools are a skin over its own HTTP API on localhost, and
  # a program talking to itself is not "interacting with external entities".
  sealed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: browser-actions/setup-chrome@v1
      - name: check out the seven tools
        run: |
          mkdir -p _tools
          for t in agent-hq lens anvil cortex scout recall iris; do
            git clone --depth 1 -q "https://github.com/tools-for-agents/$t.git" "_tools/$t"
          done
      - name: every openWorldHint:false must stay home
        run: node build/sealed.mjs --root "$PWD/_tools"

  # IS `destructiveHint: false` TRUE? — the third leg of the annotation trilogy.
  #
  # honest.mjs proves a readOnly tool writes nothing. sealed.mjs proves a closed-world tool stays
  # off the network. This proves a NON-DESTRUCTIVE tool is genuinely additive: it may ADD records,
  # but it must never DELETE one the user already had. destructiveHint:false is a promise the client
  # acts on — such a tool may be called WITHOUT warning the user, because we said it cannot lose
  # their data. A non-destructive tool that deletes a note is data loss with a reassuring label.
  #
  # It snapshots the SET of primary keys before, calls each additive tool, and demands every key is
  # still there. Not row count (a delete+insert nets zero and fooled that — I proved it), not row
  # equality (an UPDATE to a lifecycle field would misfire). Identity: only a real deletion trips it.
  #
  # Proven to bite: plant a DELETE into cortex_capture and this goes red, naming the tool.
  additive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: browser-actions/setup-chrome@v1
      - name: check out the seven tools
        run: |
          mkdir -p _tools
          for t in agent-hq lens anvil cortex scout recall iris; do
            git clone --depth 1 -q "https://github.com/tools-for-agents/$t.git" "_tools/$t"
          done
      - name: every destructiveHint:false tool must only add
        run: node build/additive.mjs --root "$PWD/_tools"

  # IS `idempotentHint: true` TRUE? — the fourth and last annotation.
  #
  # honest/sealed/additive cover the safety hints (writes? destroys? phones home?). This covers the
  # RETRY hint: idempotentHint:true says calling again with the same args has no additional effect,
  # so a client may safely retry after a dropped response. A tool that claims it and creates a NEW
  # record every call is a slow-motion data bug — retry logic quietly floods the store with dupes.
  #
  # Calls each idempotent+writing tool ONCE, snapshots the primary-key set, calls it AGAIN with the
  # same args, and demands the second call created no new key. (An idempotent re-write bumps
  # updated_at; identity, not byte-equality, is the right lens.)
  #
  # Proven to bite: make cortex_write mint a fresh slug per call and this goes red, naming the tool.
  idempotent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: browser-actions/setup-chrome@v1
      - name: check out the seven tools
        run: |
          mkdir -p _tools
          for t in agent-hq lens anvil cortex scout recall iris; do
            git clone --depth 1 -q "https://github.com/tools-for-agents/$t.git" "_tools/$t"
          done
      - name: every idempotentHint:true tool must be safe to retry
        run: node build/idempotent.mjs --root "$PWD/_tools"
